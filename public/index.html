<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhatsApp Clone</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#075E54}
.box{background:white;max-width:400px;margin:80px auto;padding:30px;border-radius:10px}
h2{color:#075E54;text-align:center;margin-bottom:20px}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:5px;font-size:16px}
button{width:100%;padding:12px;background:#25D366;color:white;border:none;border-radius:5px;font-size:16px;margin:5px 0}
#error{color:red;text-align:center;margin:10px 0}
#chat{display:none}
#messages{height:300px;overflow-y:auto;border:1px solid #ddd;padding:10px;margin:10px 0;border-radius:5px}
.msg{padding:8px;margin:4px;background:#DCF8C6;border-radius:5px;max-width:80%}
.msg-row{display:flex;margin:4px 0}
</style>
</head>
<body>
<div class="box" id="login">
<h2>💬 WhatsApp Clone</h2>
<input id="uname" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()" style="background:#075E54">Login</button>
<div id="error"></div>
</div>
<div class="box" id="chat">
<h2>💬 Chat</h2>
<div id="messages"></div>
<input id="msg" placeholder="Message likho...">
<button onclick="sendMsg()">Send</button>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io();
var token = null;
var myName = null;

async function signup(){
  var u = document.getElementById('uname').value;
  var p = document.getElementById('pass').value;
  var r = await fetch('/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  var d = await r.json();
  if(d.error) document.getElementById('error').textContent = d.error;
  else document.getElementById('error').textContent = 'Account ban gaya! Ab login karo!';
}

async function login(){
  var u = document.getElementById('uname').value;
  var p = document.getElementById('pass').value;
  var r = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  var d = await r.json();
  if(d.error) document.getElementById('error').textContent = d.error;
  else {
    token = d.token;
    myName = d.username;
    document.getElementById('login').style.display = 'none';
    document.getElementById('chat').style.display = 'block';
  }
}

function sendMsg(){
  var msg = document.getElementById('msg').value;
  if(msg && token){
    socket.emit('message',{username:myName,text:msg});
    document.getElementById('msg').value='';
  }
}

socket.on('message',function(data){
  var div = document.createElement('div');
  div.className = 'msg-row';
  div.innerHTML = '<div class="msg"><b>'+data.username+':</b> '+data.text+'</div>';
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 999999;
});
</script>
</body>
</html>

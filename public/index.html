<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatApp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#111b21}
#login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:white;padding:20px}
#login-page h1{color:#25d366;font-size:28px;margin-bottom:30px}
input{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;font-size:16px;background:#2a3942;color:white}
input::placeholder{color:#8696a0}
.btn{width:100%;padding:12px;background:#25d366;color:white;border:none;border-radius:8px;font-size:16px;margin:8px 0;cursor:pointer}
#error{color:red;text-align:center;margin:10px 0;font-size:14px}
#success{color:#25d366;text-align:center;margin:10px 0;font-size:14px}
#otp-section{display:none;width:100%}
#chat-page{display:none;height:100vh;flex-direction:column}
#header{background:#1f2c34;padding:15px;color:white;font-size:18px;font-weight:bold;display:flex;justify-content:space-between;align-items:center}
#tabs{display:flex;background:#1f2c34;border-bottom:1px solid #2a3942}
.tab{flex:1;padding:12px;text-align:center;color:#8696a0;cursor:pointer;font-size:14px}
.tab.active{color:#25d366;border-bottom:2px solid #25d366}
#users-list,#groups-list{background:#111b21;overflow-y:auto;flex:1}
.user-item,.group-item{padding:15px;border-bottom:1px solid #2a3942;color:white;cursor:pointer;display:flex;align-items:center}
.user-item:hover,.group-item:hover{background:#2a3942}
.user-avatar,.group-avatar{width:45px;height:45px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:15px;color:white;font-weight:bold;position:relative}
.group-avatar{background:#075e54}
.online-dot{width:12px;height:12px;background:#25d366;border-radius:50%;position:absolute;bottom:0;right:0;border:2px solid #111b21}
.offline-dot{width:12px;height:12px;background:#8696a0;border-radius:50%;position:absolute;bottom:0;right:0;border:2px solid #111b21}
#chat-window{display:none;height:100vh;flex-direction:column}
#chat-header{background:#1f2c34;padding:15px;color:white;display:flex;align-items:center;justify-content:space-between}
#chat-header-left{display:flex;align-items:center}
#back-btn{margin-right:15px;cursor:pointer;font-size:20px}
#messages{flex:1;overflow-y:auto;padding:10px;background:#0b141a}
.msg{max-width:70%;padding:8px 12px;margin:4px;border-radius:8px;color:white;font-size:14px;word-break:break-word}
.msg-sent{background:#005c4b;margin-left:auto;border-radius:8px 0 8px 8px}
.msg-received{background:#1f2c34;border-radius:0 8px 8px 8px}
.msg-sender{font-size:11px;color:#25d366;margin-bottom:3px}
.msg-time{font-size:10px;color:#8696a0;text-align:right;margin-top:3px}
.msg img{max-width:200px;border-radius:8px;cursor:pointer}
.msg audio{width:200px}
#input-area{background:#1f2c34;padding:10px;display:flex;gap:8px;align-items:center}
#msg-input{flex:1;padding:10px;border:none;border-radius:20px;background:#2a3942;color:white;font-size:16px}
#send-btn{background:#25d366;border:none;border-radius:50%;width:45px;height:45px;color:white;font-size:20px;cursor:pointer}
#img-btn,#mic-btn{background:#2a3942;border:none;border-radius:50%;width:40px;height:40px;color:white;font-size:18px;cursor:pointer}
#mic-btn.recording{background:#ef4444}
.call-btns{display:flex;gap:8px}
#voice-btn,#video-btn{background:transparent;border:none;color:#25d366;font-size:22px;cursor:pointer}
.logout-btn{background:transparent;border:1px solid #ef4444;color:#ef4444;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px}
#new-group-btn{background:#25d366;border:none;color:white;padding:8px 12px;border-radius:5px;cursor:pointer;font-size:13px}
#create-group-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:50;align-items:center;justify-content:center}
#create-group-box{background:#1f2c34;padding:20px;border-radius:10px;width:90%;max-width:400px}
#create-group-box h3{color:white;margin-bottom:15px}
#member-list{max-height:200px;overflow-y:auto;margin:10px 0}
.member-item{display:flex;align-items:center;padding:8px;color:white;cursor:pointer}
.member-item input{width:auto;margin-right:10px}
#call-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#111b21;z-index:100;flex-direction:column;align-items:center;justify-content:center}
#local-video{position:absolute;top:10px;right:10px;width:100px;height:140px;border-radius:8px;object-fit:cover;background:#000}
#remote-video{width:100%;height:100%;object-fit:cover;background:#000}
#call-overlay{position:absolute;bottom:40px;display:flex;flex-direction:column;align-items:center;gap:20px}
#call-name-display{color:white;font-size:20px;font-weight:bold}
#call-status-display{color:#8696a0;font-size:14px}
#call-controls{display:flex;gap:20px}
.call-ctrl-btn{width:55px;height:55px;border-radius:50%;border:none;font-size:22px;cursor:pointer}
.end-btn{background:#ef4444;color:white}
.mute-btn{background:#2a3942;color:white}
.cam-btn{background:#2a3942;color:white}
#incoming-call{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:200;flex-direction:column;align-items:center;justify-content:center;color:white}
#incoming-name{font-size:22px;font-weight:bold;margin:10px 0}
#incoming-type{color:#8696a0;margin-bottom:30px}
#incoming-controls{display:flex;gap:30px}
</style>
</head>
<body>
<div id="login-page">
<h1>💬 ChatApp</h1>
<input id="name-input" placeholder="Apna naam likho">
<input id="email-input" placeholder="Email likho" type="email">
<button class="btn" onclick="sendOTP()">OTP Bhejo</button>
<div id="otp-section">
<input id="otp-input" placeholder="6 digit OTP likho" type="number">
<button class="btn" onclick="verifyOTP()">Verify Karo</button>
</div>
<div id="error"></div>
<div id="success"></div>
</div>

<div id="chat-page">
<div id="header"><input type="file" id="pp-input" accept="image/*" style="display:none" onchange="uploadPP()">
<span onclick="showProfile()" style="cursor:pointer">💬 ChatApp</span>
<div style="display:flex;gap:8px">
<button id="new-group-btn" onclick="showCreateGroup()">+ Group</button>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>
</div>
<div id="tabs">
<div class="tab active" onclick="showTab('chats')">Chats</div>
<div class="tab" onclick="showTab('groups')">Groups</div>
</div>
<div id="users-list"></div>
<div id="groups-list" style="display:none"></div>
</div>

<div id="create-group-modal">
<div id="create-group-box">
<h3>Naya Group Banao</h3>
<input id="group-name-input" placeholder="Group ka naam...">
<div id="member-list"></div>
<button class="btn" onclick="createGroup()">Group Banao</button>
<button class="btn" style="background:#ef4444" onclick="hideCreateGroup()">Cancel</button>
</div>
</div>

<div id="chat-window">
<div id="chat-header">
<div id="chat-header-left">
<span id="back-btn" onclick="goBack()">←</span>
<div class="user-avatar" id="chat-avatar">👤</div>
<div style="margin-left:10px">
<div id="chat-name"></div>
<div id="chat-status" style="font-size:12px;color:#25d366"></div>
</div>
</div>
<div class="call-btns" id="call-btns">
<button id="voice-btn" onclick="startCall('audio')">📞</button>
<button id="video-btn" onclick="startCall('video')">📹</button>
</div>
</div>
<div id="messages"></div>
<div id="input-area">
<button id="img-btn" onclick="document.getElementById('img-input').click()">📷</button>
<input type="file" id="img-input" accept="image/*" style="display:none" onchange="sendImage()">
<button id="mic-btn" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()">🎤</button>
<input id="msg-input" placeholder="Message likho..." onkeypress="if(event.key==='Enter')sendMessage()">
<button id="send-btn" onclick="sendMessage()">➤</button>
</div>
</div>

<div id="call-screen">
<video id="remote-video" autoplay playsinline></video>
<video id="local-video" autoplay playsinline muted></video>
<audio id="remote-audio" autoplay></audio>
<div id="call-overlay">
<div id="call-name-display"></div>
<div id="call-status-display">Calling...</div>
<div id="call-controls">
<button class="call-ctrl-btn mute-btn" onclick="toggleMute()">🔇</button>
<button class="call-ctrl-btn end-btn" onclick="endCall()">📵</button>
<button class="call-ctrl-btn cam-btn" id="cam-toggle-btn" onclick="toggleCamera()">📷</button>
</div>
</div>
</div>

<div id="incoming-call">
<div style="font-size:50px">📞</div>
<div id="incoming-name"></div>
<div id="incoming-type"></div>
<div id="incoming-controls">
<button class="call-ctrl-btn end-btn" onclick="rejectCall()">📵</button>
<button class="call-ctrl-btn" style="background:#25d366;color:white" onclick="acceptCall()">📞</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket=io();
var myEmail=localStorage.getItem('email');
var myName=localStorage.getItem('name');
var myToken=localStorage.getItem('token');
var currentChat=null;
var currentGroup=null;
var mediaRecorder=null;
var audioChunks=[];
var isRecording=false;
var peerConnection=null;
var localStream=null;
var incomingOffer=null;
var incomingFrom=null;
var incomingCallType=null;
var isMuted=false;
var callType='audio';
var allUsers=[];
var iceServers={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};

if(myToken){showChatPage();}

async function sendOTP(){
  var name=document.getElementById('name-input').value.trim();
  var email=document.getElementById('email-input').value.trim();
  document.getElementById('error').textContent='';
  document.getElementById('success').textContent='';
  if(!name||!email){document.getElementById('error').textContent='Naam aur email daalo!';return;}
  try{
    document.getElementById('success').textContent='Bhej rahe hain...';
    var r=await fetch('/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,name})});
    var d=await r.json();
    if(d.error){document.getElementById('error').textContent=d.error;document.getElementById('success').textContent='';}
    else{document.getElementById('success').textContent='OTP bhej diya!';document.getElementById('otp-section').style.display='block';}
  }catch(e){document.getElementById('error').textContent='Network error!';}
}

async function verifyOTP(){
  var email=document.getElementById('email-input').value.trim();
  var otp=document.getElementById('otp-input').value.trim();
  try{
    var r=await fetch('/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,otp})});
    var d=await r.json();
    if(d.error){document.getElementById('error').textContent=d.error;}
    else{
      localStorage.setItem('token',d.token);localStorage.setItem('email',d.email);localStorage.setItem('name',d.name);
      myEmail=d.email;myName=d.name;myToken=d.token;showChatPage();
    }
  }catch(e){document.getElementById('error').textContent='Network error!';}
}

async function showChatPage(){
  document.getElementById('login-page').style.display='none';
  document.getElementById('chat-page').style.display='flex';
  socket.emit('join',myEmail);
  loadUsers();
  loadGroups();
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(tab==='chats'){
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('users-list').style.display='block';
    document.getElementById('groups-list').style.display='none';
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('users-list').style.display='none';
    document.getElementById('groups-list').style.display='block';
  }
}

async function loadUsers(){
  try{
    var r=await fetch('/users');
    allUsers=await r.json();
    var html='';
    allUsers.forEach(u=>{
      if(u.email!==myEmail){
        html+='<div class="user-item" onclick="openChat(\''+u.email+'\',\''+u.name+'\')">';
        html+='<div class="user-avatar">'+u.name[0].toUpperCase();
        html+='<div class="'+(u.online?'online-dot':'offline-dot')+'"></div></div>';
        html+='<div><b>'+u.name+'</b><br><small style="color:#8696a0">'+(u.online?'Online':'Last seen: '+new Date(u.lastSeen).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}))+'</small></div></div>';
      }
    });
    document.getElementById('users-list').innerHTML=html||'<p style="color:#8696a0;padding:20px;text-align:center">Koi user nahi mila!</p>';
  }catch(e){console.log(e);}
}

async function loadGroups(){
  try{
    var r=await fetch('/groups/'+myEmail);
    var groups=await r.json();
    var html='';
    groups.forEach(g=>{
      html+='<div class="group-item" onclick="openGroup(\''+g._id+'\',\''+g.name+'\')">';
      html+='<div class="group-avatar">👥</div>';
      html+='<div><b>'+g.name+'</b><br><small style="color:#8696a0">'+g.members.length+' members</small></div></div>';
    });
    document.getElementById('groups-list').innerHTML=html||'<p style="color:#8696a0;padding:20px;text-align:center">Koi group nahi hai!</p>';
  }catch(e){console.log(e);}
}

function showCreateGroup(){
  var html='';
  allUsers.forEach(u=>{
    if(u.email!==myEmail){
      html+='<div class="member-item"><input type="checkbox" value="'+u.email+'" id="m_'+u.email+'"><label for="m_'+u.email+'">'+u.name+'</label></div>';
    }
  });
  document.getElementById('member-list').innerHTML=html;
  document.getElementById('create-group-modal').style.display='flex';
}

function hideCreateGroup(){
  document.getElementById('create-group-modal').style.display='none';
}

async function createGroup(){
  var name=document.getElementById('group-name-input').value.trim();
  if(!name){alert('Group ka naam daalo!');return;}
  var members=[myEmail];
  document.querySelectorAll('#member-list input:checked').forEach(c=>members.push(c.value));
  if(members.length<2){alert('Kam se kam ek member add karo!');return;}
  try{
    var r=await fetch('/create-group',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,members,admin:myEmail})});
    var d=await r.json();
    if(d.success){hideCreateGroup();loadGroups();showTab('groups');}
  }catch(e){console.log(e);}
}

async function openChat(email,name){
  currentChat={email,name};
  currentGroup=null;
  document.getElementById('chat-page').style.display='none';
  document.getElementById('chat-window').style.display='flex';
  document.getElementById('chat-name').textContent=name;
  document.getElementById('chat-avatar').textContent=name[0].toUpperCase();
  document.getElementById('chat-avatar').style.background='#25d366';
  document.getElementById('call-btns').style.display='flex';
  document.getElementById('messages').innerHTML='';
  try{
    var r=await fetch('/messages/'+myEmail+'/'+email);
    var msgs=await r.json();
    msgs.forEach(m=>addMessage(m,false));
  }catch(e){console.log(e);}
}

async function openGroup(groupId,name){
  currentGroup={id:groupId,name};
  currentChat=null;
  document.getElementById('chat-page').style.display='none';
  document.getElementById('chat-window').style.display='flex';
  document.getElementById('chat-name').textContent=name;
  document.getElementById('chat-avatar').textContent='👥';
  document.getElementById('chat-avatar').style.background='#075e54';
  document.getElementById('call-btns').style.display='none';
  document.getElementById('messages').innerHTML='';
  socket.emit('join-group',groupId);
  try{
    var r=await fetch('/group-messages/'+groupId);
    var msgs=await r.json();
    msgs.forEach(m=>addMessage(m,true));
  }catch(e){console.log(e);}
}

function goBack(){
  document.getElementById('chat-window').style.display='none';
  document.getElementById('chat-page').style.display='flex';
  currentChat=null;currentGroup=null;
  loadUsers();loadGroups();
}

function addMessage(data,isGroup){
  var div=document.createElement('div');
  div.className='msg '+(data.from===myEmail?'msg-sent':'msg-received');
  var time=new Date(data.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  var content='';
  if(isGroup&&data.from!==myEmail) content+='<div class="msg-sender">'+data.fromName+'</div>';
  if(data.image) content+='<img src="'+data.image+'" onclick="window.open(this.src)">';
  if(data.audio) content+='<audio controls src="'+data.audio+'"></audio>';
  if(data.text) content+=data.text;
  content+='<div class="msg-time">'+time+(data.from===myEmail?' ✓✓':'')+'</div>';
  div.innerHTML=content;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop=999999;
}

function sendMessage(){
  var text=document.getElementById('msg-input').value.trim();
  if(!text)return;
  if(currentChat){
    socket.emit('private-message',{from:myEmail,fromName:myName,to:currentChat.email,text,time:new Date()});
  } else if(currentGroup){
    socket.emit('group-message',{from:myEmail,fromName:myName,groupId:currentGroup.id,text,time:new Date()});
  }
  document.getElementById('msg-input').value='';
}

async function sendImage(){
  var file=document.getElementById('img-input').files[0];
  if(!file)return;
  var formData=new FormData();
  formData.append('image',file);
  try{
    var r=await fetch('/upload-image',{method:'POST',body:formData});
    var d=await r.json();
    if(d.imageUrl){
      if(currentChat) socket.emit('private-message',{from:myEmail,fromName:myName,to:currentChat.email,text:'',image:d.imageUrl,time:new Date()});
      else if(currentGroup) socket.emit('group-message',{from:myEmail,fromName:myName,groupId:currentGroup.id,text:'',image:d.imageUrl,time:new Date()});
    }
  }catch(e){console.log(e);}
  document.getElementById('img-input').value='';
}

async function startRecording(){
  if(isRecording)return;
  try{
    var stream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(stream);
    audioChunks=[];
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.start();
    isRecording=true;
    document.getElementById('mic-btn').classList.add('recording');
  }catch(e){alert('Microphone access do!');}
}

async function stopRecording(){
  if(!isRecording||!mediaRecorder)return;
  mediaRecorder.stop();
  isRecording=false;
  document.getElementById('mic-btn').classList.remove('recording');
  mediaRecorder.onstop=async()=>{
    var blob=new Blob(audioChunks,{type:'audio/webm'});
    var formData=new FormData();
    formData.append('audio',blob,'voice.webm');
    fetch('/upload-audio',{method:'POST',body:formData}).then(r=>r.json()).then(d=>{
      if(d.audioUrl){
        if(currentChat) socket.emit('private-message',{from:myEmail,fromName:myName,to:currentChat.email,text:'',audio:d.audioUrl,time:new Date()});
        else if(currentGroup) socket.emit('group-message',{from:myEmail,fromName:myName,groupId:currentGroup.id,text:'',audio:d.audioUrl,time:new Date()});
      }
    });
  };
}

async function startCall(type){
  if(!currentChat)return;
  callType=type;
  try{
    var constraints=type==='video'?{audio:true,video:true}:{audio:true};
    localStream=await navigator.mediaDevices.getUserMedia(constraints);
    if(type==='video') document.getElementById('local-video').srcObject=localStream;
    peerConnection=new RTCPeerConnection(iceServers);
    localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));
    peerConnection.ontrack=e=>{
      if(type==='video') document.getElementById('remote-video').srcObject=e.streams[0];
      else document.getElementById('remote-audio').srcObject=e.streams[0];
    };
    peerConnection.onicecandidate=e=>{if(e.candidate) socket.emit('ice-candidate',{to:currentChat.email,from:myEmail,candidate:e.candidate});};
    var offer=await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    socket.emit('call-offer',{to:currentChat.email,from:myEmail,fromName:myName,offer,callType:type});
    document.getElementById('call-screen').style.display='flex';
    document.getElementById('call-name-display').textC
ontent=currentChat.name;
    document.getElementById('call-status-display').textContent='Calling...';
  }catch(e){alert('Camera/Microphone access do!');}
}

async function acceptCall(){
  document.getElementById('incoming-call').style.display='none';
  document.getElementById('call-screen').style.display='flex';
  callType=incomingCallType;
  try{
    var constraints=callType==='video'?{audio:true,video:true}:{audio:true};
    localStream=await navigator.mediaDevices.getUserMedia(constraints);
    if(callType==='video') document.getElementById('local-video').srcObject=localStream;
    peerConnection=new RTCPeerConnection(iceServers);
    localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));
    peerConnection.ontrack=e=>{
      if(callType==='video') document.getElementById('remote-video').srcObject=e.streams[0];
      else document.getElementById('remote-audio').srcObject=e.streams[0];
    };
    peerConnection.onicecandidate=e=>{if(e.candidate) socket.emit('ice-candidate',{to:incomingFrom,from:myEmail,candidate:e.candidate});};
    await peerConnection.setRemoteDescription(incomingOffer);
    var answer=await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit('call-answer',{to:incomingFrom,from:myEmail,answer});
    document.getElementById('call-status-display').textContent='Connected';
  }catch(e){console.log(e);}
}

function rejectCall(){
  socket.emit('call-reject',{to:incomingFrom});
  document.getElementById('incoming-call').style.display='none';
}

function endCall(){
  if(peerConnection){peerConnection.close();peerConnection=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  if(currentChat) socket.emit('call-end',{to:currentChat.email});
  document.getElementById('call-screen').style.display='none';
}

function toggleMute(){
  isMuted=!isMuted;
  if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  document.querySelector('.mute-btn').textContent=isMuted?'🔈':'🔇';
}

function toggleCamera(){
  if(localStream){var v=localStream.getVideoTracks()[0];if(v)v.enabled=!v.enabled;}
}

socket.on('call-offer',async(data)=>{
  incomingOffer=new RTCSessionDescription(data.offer);
  incomingFrom=data.from;
  incomingCallType=data.callType;
  document.getElementById('incoming-call').style.display='flex';
  document.getElementById('incoming-name').textContent=data.fromName+' ka call!';
  document.getElementById('incoming-type').textContent=data.callType==='video'?'📹 Video Call':'📞 Voice Call';
});

socket.on('call-answer',async(data)=>{
  if(peerConnection){await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));document.getElementById('call-status-display').textContent='Connected';}
});

socket.on('ice-candidate',async(data)=>{
  if(peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
});

socket.on('call-end',()=>{
  if(peerConnection){peerConnection.close();peerConnection=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  document.getElementById('call-screen').style.display='none';
});

socket.on('call-reject',()=>{
  document.getElementById('call-screen').style.display='none';
  alert('Call reject ho gaya!');
});

socket.on('private-message',function(data){
  if(currentChat&&(data.from===currentChat.email||data.to===currentChat.email)) addMessage(data,false);
});

socket.on('group-message',function(data){
  if(currentGroup&&data.groupId===currentGroup.id) addMessage(data,true);
});

socket.on('user-status',function(){loadUsers();});

async function uploadPP(){
  var file=document.getElementById("pp-input").files[0];
  if(!file)return;
  var fd=new FormData();
  fd.append("photo",file);
  fd.append("email",myEmail);
  var r=await fetch("/upload-profile",{method:"POST",body:fd});
  var d=await r.json();
  if(d.photoUrl){
    document.getElementById("my-av").innerHTML="<img src=\""+d.photoUrl+"\" style=\"width:100%;height:100%;object-fit:cover;border-radius:50%\">";
  }
}
function logout(){localStorage.clear();location.reload();}
</script>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatApp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#111b21}
#login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:white;padding:20px}
#login-page h1{color:#25d366;font-size:28px;margin-bottom:30px}
input{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;font-size:16px;background:#2a3942;color:white}
input::placeholder{color:#8696a0}
.btn{width:100%;padding:12px;background:#25d366;color:white;border:none;border-radius:8px;font-size:16px;margin:8px 0;cursor:pointer}
#error{color:red;text-align:center;margin:10px 0}
#success{color:#25d366;text-align:center;margin:10px 0}
#chat-page{display:none;height:100vh;flex-direction:column}
#header{background:#1f2c34;padding:15px;color:white;font-size:18px;font-weight:bold}
#users-list{background:#111b21;overflow-y:auto;flex:1}
.user-item{padding:15px;border-bottom:1px solid #2a3942;color:white;cursor:pointer;display:flex;align-items:center}
.user-item:hover{background:#2a3942}
.user-avatar{width:45px;height:45px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:15px}
#chat-window{display:none;height:100vh;flex-direction:column}
#chat-header{background:#1f2c34;padding:15px;color:white;display:flex;align-items:center}
#back-btn{margin-right:15px;cursor:pointer;font-size:20px}
#messages{flex:1;overflow-y:auto;padding:10px;background:#0b141a}
.msg{max-width:70%;padding:8px 12px;margin:4px;border-radius:8px;color:white;font-size:14px}
.msg-sent{background:#005c4b;margin-left:auto}
.msg-received{background:#1f2c34}
#input-area{background:#1f2c34;padding:10px;display:flex;gap:10px}
#msg-input{flex:1;padding:10px;border:none;border-radius:20px;background:#2a3942;color:white;font-size:16px}
#send-btn{background:#25d366;border:none;border-radius:50%;width:45px;height:45px;color:white;font-size:20px;cursor:pointer}
</style>
</head>
<body>
<div id="login-page">
<h1>💬 ChatApp</h1>
<input id="name-input" placeholder="Apna naam likho">
<input id="email-input" placeholder="Email likho" type="email">
<button class="btn" onclick="sendOTP()">OTP Bhejo</button>
<input id="otp-input" placeholder="OTP likho" style="display:none">
<button class="btn" id="verify-btn" onclick="verifyOTP()" style="display:none">Verify Karo</button>
<div id="error"></div>
<div id="success"></div>
</div>

<div id="chat-page">
<div id="header">💬 ChatApp</div>
<div id="users-list"></div>
</div>

<div id="chat-window">
<div id="chat-header">
<span id="back-btn" onclick="goBack()">←</span>
<div class="user-avatar" id="chat-avatar">👤</div>
<span id="chat-name"></span>
</div>
<div id="messages"></div>
<div id="input-area">
<input id="msg-input" placeholder="Message likho...">
<button id="send-btn" onclick="sendMessage()">➤</button>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io();
var myEmail = localStorage.getItem('email');
var myName = localStorage.getItem('name');
var myToken = localStorage.getItem('token');
var currentChat = null;

if(myToken) showChatPage();

async function sendOTP(){
  var name = document.getElementById('name-input').value;
  var email = document.getElementById('email-input').value;
  if(!name || !email){ document.getElementById('error').textContent = 'Naam aur email daalo!'; return; }
  var r = await fetch('/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,name})});
  var d = await r.json();
  if(d.error){ document.getElementById('error').textContent = d.error; return; }
  document.getElementById('success').textContent = 'OTP bhej diya! Email check karo!';
  document.getElementById('otp-input').style.display = 'block';
  document.getElementById('verify-btn').style.display = 'block';
}

async function verifyOTP(){
  var email = document.getElementById('email-input').value;
  var otp = document.getElementById('otp-input').value;
  var r = await fetch('/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,otp})});
  var d = await r.json();
  if(d.error){ document.getElementById('error').textContent = d.error; return; }
  localStorage.setItem('token', d.token);
  localStorage.setItem('email', d.email);
  localStorage.setItem('name', d.name);
  myEmail = d.email; myName = d.name; myToken = d.token;
  showChatPage();
}

async function showChatPage(){
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('chat-page').style.display = 'flex';
  var r = await fetch('/users');
  var users = await r.json();
  var html = '';
  users.forEach(u => {
    if(u.email !== myEmail){
      html += '<div class="user-item" onclick="openChat(\''+u.email+'\',\''+u.name+'\')">';
      html += '<div class="user-avatar">'+u.name[0].toUpperCase()+'</div>';
      html += '<div><b>'+u.name+'</b><br><small>'+u.email+'</small></div></div>';
    }
  });
  document.getElementById('users-list').innerHTML = html || '<p style="color:white;padding:20px">Koi user nahi mila!</p>';
}

function openChat(email, name){
  currentChat = {email, name};
  document.getElementById('chat-page').style.display = 'none';
  document.getElementById('chat-window').style.display = 'flex';
  document.getElementById('chat-name').textContent = name;
  document.getElementById('chat-avatar').textContent = name[0].toUpperCase();
  document.getElementById('messages').innerHTML = '';
}

function goBack(){
  document.getElementById('chat-window').style.display = 'none';
  document.getElementById('chat-page').style.display = 'flex';
}

function sendMessage(){
  var text = document.getElementById('msg-input').value;
  if(!text || !currentChat) return;
  socket.emit('private-message', {from: myEmail, fromName: myName, to: currentChat.email, text});
  document.getElementById('msg-input').value = '';
}

socket.on('private-message', function(data){
  if(currentChat && (data.from === currentChat.email || data.to === currentChat.email)){
    var div = document.createElement('div');
    div.className = 'msg ' + (data.from === myEmail ? 'msg-sent' : 'msg-received');
    div.textContent = data.text;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 999999;
  }
});
</script>
</body>
</html>
